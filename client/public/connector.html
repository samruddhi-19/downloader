<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      var baseUrl = window.location.origin;

      window.TrelloPowerUp.initialize({
        'board-buttons': function(t) {
          return [{
            icon: {
              dark: 'https://downloader-rho-flame.vercel.app/icon.svg',
              light: 'https://downloader-rho-flame.vercel.app/icon.svg'
            },
            text: 'Download Attachments',
            callback: function(t) {
              return t.modal({
                url: baseUrl,
                title: ' ',
                height: 600,
                fullscreen: false,
              });
            }
          }];
        }
      });
    </script>
  </head>
  <body></body>
</html>
