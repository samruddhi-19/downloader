<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      var baseUrl = window.location.origin;

      window.TrelloPowerUp.initialize({
        'board-buttons': function(t) {
          return [{
            icon: {
  dark: 'https://img.icons8.com/ios-filled/50/ffffff/download.png',
  light: 'https://img.icons8.com/ios-filled/50/000000/download.png'
},
            text: 'Download Attachments',
            callback: function(t) {
              return t.modal({
                url: baseUrl,
                title: 'Downloader',
                height: 600,
              });
            }
          }];
        }
      });
    </script>
  </head>
  <body></body>
</html>
